<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>職場英語フレーズカード10 | Office20</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #10233f;
        background: #f7fbff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 12% 12%, rgba(103, 199, 243, 0.22), transparent 28%),
          radial-gradient(circle at 88% 86%, rgba(155, 215, 91, 0.2), transparent 30%),
          linear-gradient(135deg, #f7fbff, #ffffff);
      }

      .app {
        width: min(100%, 820px);
        display: grid;
        gap: 18px;
      }

      header {
        display: grid;
        gap: 6px;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.1;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: #38516f;
        font-size: clamp(15px, 2.5vw, 18px);
        font-weight: 700;
      }

      .progress {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #38516f;
        font-weight: 800;
      }

      .track {
        flex: 1;
        height: 8px;
        overflow: hidden;
        border-radius: 99px;
        background: rgba(31, 93, 158, 0.12);
      }

      .bar {
        width: 10%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #1f5d9e, #6ebf45);
        transition: width 240ms ease;
      }

      .card-shell {
        perspective: 1400px;
      }

      .card {
        position: relative;
        min-height: 430px;
        transform-style: preserve-3d;
        transition: transform 420ms ease;
      }

      .card.is-flipped {
        transform: rotateY(180deg);
      }

      .face {
        position: absolute;
        inset: 0;
        display: grid;
        align-content: center;
        gap: 22px;
        padding: clamp(28px, 5vw, 54px);
        border: 2px solid rgba(31, 93, 158, 0.14);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 24px 60px rgba(16, 35, 63, 0.14);
        backface-visibility: hidden;
      }

      .back {
        transform: rotateY(180deg);
      }

      .category {
        width: fit-content;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(31, 93, 158, 0.1);
        color: #1f5d9e;
        font-size: 14px;
        font-weight: 900;
      }

      .prompt {
        font-size: clamp(30px, 5vw, 52px);
        line-height: 1.2;
        font-weight: 950;
        letter-spacing: 0;
      }

      .answer {
        color: #1f5d9e;
        font-size: clamp(30px, 5vw, 50px);
        line-height: 1.12;
        font-weight: 950;
        letter-spacing: 0;
      }

      .note {
        color: #38516f;
        font-size: clamp(17px, 2.6vw, 22px);
        line-height: 1.45;
        font-weight: 720;
      }

      .example {
        padding-left: 18px;
        border-left: 5px solid #6ebf45;
        color: #10233f;
        font-size: clamp(17px, 2.6vw, 22px);
        line-height: 1.45;
        font-weight: 760;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1.3fr 1fr;
        gap: 12px;
      }

      button {
        min-height: 54px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: #ffffff;
        color: #10233f;
        box-shadow: 0 12px 26px rgba(16, 35, 63, 0.1);
        font: 900 16px/1 system-ui, sans-serif;
        cursor: pointer;
      }

      button.primary {
        background: linear-gradient(90deg, #1f5d9e, #6ebf45);
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .download {
        text-align: center;
      }

      .download a {
        color: #1f5d9e;
        font-weight: 900;
        text-decoration: none;
      }

      @media (max-width: 640px) {
        body {
          padding: 16px;
        }

        .card {
          min-height: 460px;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <h1>職場英語フレーズカード10</h1>
        <p class="subtitle">U.S. Workplace English Flashcards | Office20 Free Sample</p>
      </header>

      <div class="progress" aria-live="polite">
        <span id="counter">1 / 10</span>
        <div class="track" aria-hidden="true"><div id="bar" class="bar"></div></div>
      </div>

      <section class="card-shell">
        <article id="card" class="card">
          <div class="face front">
            <div id="frontCategory" class="category">確認</div>
            <div id="frontText" class="prompt">少し確認させてください。</div>
          </div>
          <div class="face back">
            <div id="backCategory" class="category">確認</div>
            <div id="backText" class="answer">Let me make sure I understand.</div>
            <div id="nuance" class="note"></div>
            <div id="example" class="example"></div>
          </div>
        </article>
      </section>

      <nav class="actions" aria-label="Flashcard controls">
        <button id="prev" type="button">前へ</button>
        <button id="flip" class="primary" type="button">答えを見る</button>
        <button id="next" type="button">次へ</button>
      </nav>

      <p class="download">
        CSV版: <a href="./cards.csv" download>cards.csv をダウンロード</a>
      </p>
    </main>

    <script>
      const cards = [
        {
          category: "確認",
          front: "少し確認させてください。",
          back: "Let me make sure I understand.",
          nuance: "相手を否定せず、自分の理解を確認する自然な言い方です。",
          example: "Let me make sure I understand. You’d like the report by Friday, correct?",
        },
        {
          category: "確認",
          front: "もう少し詳しく教えていただけますか。",
          back: "Could you give me a little more context?",
          nuance: "背景情報を求める丁寧でプロフェッショナルな表現です。",
          example: "Could you give me a little more context before I update the document?",
        },
        {
          category: "確認",
          front: "念のため確認します。",
          back: "Just to confirm,",
          nuance: "メールやチャットの冒頭で使いやすい表現です。",
          example: "Just to confirm, the meeting starts at 10 a.m. Eastern time.",
        },
        {
          category: "優先順位",
          front: "優先順位を確認したいです。",
          back: "I’d like to clarify the priority.",
          nuance: "どの仕事を先に進めるべきか確認するときに便利です。",
          example:
            "I’d like to clarify the priority so I can focus on the most urgent task first.",
        },
        {
          category: "締切",
          front: "いつまでに必要ですか。",
          back: "When do you need this by?",
          nuance: "締切を自然に確認する表現です。",
          example: "When do you need this by? I want to make sure I plan my time correctly.",
        },
        {
          category: "対応",
          front: "すぐに対応します。",
          back: "I’ll take care of it right away.",
          nuance: "責任感を持って対応することが伝わる表現です。",
          example: "Thanks for letting me know. I’ll take care of it right away.",
        },
        {
          category: "保留",
          front: "少し時間をいただけますか。",
          back: "Could I have a little time to look into it?",
          nuance: "すぐに答えられないときに確認時間をもらう表現です。",
          example:
            "Could I have a little time to look into it? I want to give you an accurate answer.",
        },
        {
          category: "進捗報告",
          front: "現時点での状況を共有します。",
          back: "Here’s a quick update on where things stand.",
          nuance: "進捗報告の冒頭に使える自然な表現です。",
          example: "Here’s a quick update on where things stand with the client presentation.",
        },
        {
          category: "フィードバック",
          front: "ご指摘ありがとうございます。",
          back: "Thank you for pointing that out.",
          nuance: "指摘を前向きに受け止める表現です。",
          example: "Thank you for pointing that out. I’ll correct it and send an updated version.",
        },
        {
          category: "次の行動",
          front: "次のステップを確認しましょう。",
          back: "Let’s align on the next steps.",
          nuance: "会議の終わりやプロジェクトの区切りで使える表現です。",
          example: "Before we wrap up, let’s align on the next steps.",
        },
      ];

      let index = 0;
      let flipped = false;

      const card = document.querySelector("#card");
      const counter = document.querySelector("#counter");
      const bar = document.querySelector("#bar");
      const frontCategory = document.querySelector("#frontCategory");
      const backCategory = document.querySelector("#backCategory");
      const frontText = document.querySelector("#frontText");
      const backText = document.querySelector("#backText");
      const nuance = document.querySelector("#nuance");
      const example = document.querySelector("#example");
      const prev = document.querySelector("#prev");
      const next = document.querySelector("#next");
      const flip = document.querySelector("#flip");

      function render() {
        const item = cards[index];
        frontCategory.textContent = item.category;
        backCategory.textContent = item.category;
        frontText.textContent = item.front;
        backText.textContent = item.back;
        nuance.textContent = item.nuance;
        example.textContent = item.example;
        counter.textContent = `${index + 1} / ${cards.length}`;
        bar.style.width = `${((index + 1) / cards.length) * 100}%`;
        card.classList.toggle("is-flipped", flipped);
        flip.textContent = flipped ? "問題に戻る" : "答えを見る";
        prev.disabled = index === 0;
        next.disabled = index === cards.length - 1;
      }

      flip.addEventListener("click", () => {
        flipped = !flipped;
        render();
      });

      card.addEventListener("click", () => {
        flipped = !flipped;
        render();
      });

      prev.addEventListener("click", () => {
        index = Math.max(0, index - 1);
        flipped = false;
        render();
      });

      next.addEventListener("click", () => {
        index = Math.min(cards.length - 1, index + 1);
        flipped = false;
        render();
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === " ") {
          event.preventDefault();
          flipped = !flipped;
          render();
        }
        if (event.key === "ArrowRight" && index < cards.length - 1) {
          index += 1;
          flipped = false;
          render();
        }
        if (event.key === "ArrowLeft" && index > 0) {
          index -= 1;
          flipped = false;
          render();
        }
      });

      render();
    </script>
  </body>
</html>
